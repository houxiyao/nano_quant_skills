tables:
  # ========== 基础信息 (none 维度) ==========
  - source_table: stock_basic
    target_table: stk_info
    endpoint: stock_basic
    dimension_type: none
    method: query
    pk: [ts_code]
    order_by: [ts_code]
    sleep: 0.0
    mode: overwrite
    points: 2000
    description: "股票基础信息"

  - source_table: trade_cal
    target_table: cal_trade
    endpoint: trade_cal
    dimension_type: none
    method: query
    pk: [exchange, cal_date]
    order_by: [exchange, cal_date]
    sleep: 0.0
    mode: overwrite
    points: 120
    description: "交易日历"
    params:
      exchange: "SSE"
      start_date: "20000101"
      end_date: "20301231"

  - source_table: namechange
    target_table: stk_name_history
    endpoint: namechange
    dimension_type: none
    method: namechange
    pk: [ts_code, name, start_date]
